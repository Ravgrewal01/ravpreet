<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Will You Marry Me? 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --maroon: #7b0d1e;
      --rose:   #c0415a;
      --gold:   #d4af37;
      --gold2:  #f0d060;
    }

    html, body {
      min-height: 100vh;
      font-family: 'Lora', Georgia, serif;
      overflow-x: hidden;
    }

    body {
      background: linear-gradient(160deg, var(--maroon) 0%, #b03050 30%, #e87090 60%, #fce8ee 85%, #fff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* ── Floating Hearts ── */
    .hearts-bg { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .heart-float {
      position: absolute; bottom: -60px; opacity: 0;
      animation: floatUp linear infinite;
      filter: drop-shadow(0 0 4px rgba(200,50,80,0.4));
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-10deg) scale(0.8); opacity: 0; }
      10%  { opacity: 0.65; }
      80%  { opacity: 0.35; }
      100% { transform: translateY(-110vh) rotate(20deg) scale(1.2); opacity: 0; }
    }

    /* ── Screens ── */
    #box-screen, #proposal-screen {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      width: 100%; min-height: 100vh; padding: 24px;
    }
    #proposal-screen { display: none; }

    /* ════════════════════════════════════════
       RING BOX  —  proper closed-lid model
       ----------------------------------------
       The entire box uses a 3-D scene.
       The LID starts rotated FORWARD (closed),
       covering the body. On open it flips BACK.

       Coordinate system (CSS 3D, Y down):
         rotateX(+N) = top tilts away  (opens)
         rotateX(-N) = top tilts toward (closes over front)

       closed = rotateX(0)  → lid lies flat on top of body
       open   = rotateX(-118deg) → lid flips back behind box
    ════════════════════════════════════════ */

    .box-scene {
      /* 3-D context */
      perspective: 800px;
      perspective-origin: 50% 20%;

      width: 200px;
      /* total visual height when closed = body(130) + lid(80) = 210 */
      height: 210px;
      position: relative;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* soft gold glow while waiting */
    .box-scene:not(.opened) { animation: scenePulse 2.4s ease-in-out infinite; }
    @keyframes scenePulse {
      0%,100% { filter: drop-shadow(0 0 2px rgba(212,175,55,0.1)); }
      50%      { filter: drop-shadow(0 0 24px rgba(212,175,55,0.65)); }
    }

    /* ─── BOX BODY ─── */
    .box-body {
      position: absolute;
      bottom: 0; left: 0;
      width: 200px; height: 130px;
      border-radius: 8px 8px 16px 16px;
      background: linear-gradient(170deg, #8b1a2a 0%, #5c0d18 55%, #3a0810 100%);
      box-shadow:
        0 20px 55px rgba(30,0,8,0.65),
        inset 0 1px 0 rgba(255,200,160,0.15),
        inset 0 -3px 0 rgba(0,0,0,0.35);
      overflow: hidden;
    }

    /* velvet interior — hidden until lid opens */
    .box-body::before {
      content: '';
      position: absolute;
      inset: 7px 7px 0;
      background: radial-gradient(ellipse at 50% 60%, #7a0020 0%, #350008 100%);
      border-radius: 4px 4px 10px 10px;
      box-shadow: inset 0 6px 22px rgba(0,0,0,0.7);
    }

    /* gold trim band */
    .box-body::after {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 0; height: 9px;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
      box-shadow: 0 0 10px rgba(212,175,55,0.5);
    }

    /* ring on pillow — visible only after box opens */
    .ring-pillow {
      position: absolute;
      bottom: 18px; left: 50%;
      transform: translateX(-50%);
      width: 80px; height: 50px;
      background: radial-gradient(ellipse at 50% 35%, #fff6f8 0%, #e8b8c8 50%, #c88098 100%);
      border-radius: 50% / 40%;
      box-shadow: 0 5px 18px rgba(0,0,0,0.4), inset 0 -2px 6px rgba(160,60,80,0.3);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;                     /* hidden while closed */
      transition: opacity 0.5s ease 0.6s; /* fade in after lid lifts */
      z-index: 2;
    }
    .box-scene.opened .ring-pillow { opacity: 1; }

    .ring-emoji {
      font-size: 1.7rem;
      transform: translateY(-5px);
      filter: drop-shadow(0 2px 5px rgba(0,0,0,0.45));
    }

    /* ─── BOX LID  (3-D flip) ─── */
    /*
      The lid wrapper sits at the top of the scene.
      transform-origin = bottom center → hinge is at bottom edge of lid.

      CLOSED state: rotateX(0deg)
        The lid is perfectly flat, sitting on top of the body.
        Because the scene has perspective, it looks like a
        closed box viewed slightly from above.

      OPEN state: rotateX(-118deg)
        The lid rotates backward (top goes away from viewer),
        ending up behind/above the box body.
    */
    .box-lid-wrap {
      position: absolute;
      top: 0; left: 0;
      width: 200px; height: 80px;
      transform-origin: bottom center;
      transform-style: preserve-3d;
      transform: rotateX(0deg);                              /* CLOSED */
      transition: transform 1.0s cubic-bezier(0.22, 0.8, 0.36, 1);
      z-index: 10; /* lid above body when closed */
    }
    .box-scene.opened .box-lid-wrap {
      transform: rotateX(-118deg);                           /* OPEN   */
    }

    /* front face of lid */
    .box-lid {
      position: absolute; inset: 0;
      background: linear-gradient(170deg, #a02535 0%, #6e1422 55%, #440e18 100%);
      border-radius: 14px 14px 4px 4px;
      box-shadow:
        0 -4px 18px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,190,170,0.2);
      backface-visibility: hidden;
    }
    /* velvet inside of lid (back face) */
    .box-lid::before {
      content: '';
      position: absolute; inset: 7px;
      background: radial-gradient(ellipse at 50% 35%, #801525 0%, #3a0008 100%);
      border-radius: 9px 9px 2px 2px;
      box-shadow: inset 0 3px 12px rgba(0,0,0,0.55);
    }
    /* gold rim around lid top */
    .box-lid::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 7px;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
      border-radius: 14px 14px 0 0;
      box-shadow: 0 0 8px rgba(212,175,55,0.5);
    }

    /* gold hinge strip at bottom of lid */
    .lid-hinge {
      position: absolute;
      bottom: 0; left: 15%; right: 15%; height: 8px;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
      border-radius: 0 0 4px 4px;
      box-shadow: 0 2px 8px rgba(212,175,55,0.55);
      z-index: 2;
    }

    /* gold clasp button on lid */
    .lid-clasp {
      position: absolute;
      bottom: 10px; left: 50%;
      transform: translateX(-50%);
      width: 16px; height: 16px;
      background: radial-gradient(circle at 35% 30%, var(--gold2) 0%, var(--gold) 60%, #a07820 100%);
      border-radius: 50%;
      box-shadow: 0 1px 5px rgba(0,0,0,0.5), 0 0 8px rgba(212,175,55,0.6);
      z-index: 3;
    }

    /* ─── TAP HINT ─── */
    .tap-hint {
      margin-top: 36px;
      color: rgba(255,255,255,0.9);
      font-style: italic; font-size: 1rem;
      letter-spacing: 0.03em;
      text-shadow: 0 1px 8px rgba(0,0,0,0.35);
      animation: hintPulse 1.9s ease-in-out infinite;
      transition: opacity 0.4s ease;
    }
    @keyframes hintPulse {
      0%,100% { opacity: 0.55; transform: translateY(0); }
      50%      { opacity: 1;   transform: translateY(-5px); }
    }

    /* ════════════════════════════════════════
       PROPOSAL CARD
    ════════════════════════════════════════ */
    .card {
      position: relative; z-index: 10;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(16px);
      border: 1.5px solid rgba(255,255,255,0.7);
      border-radius: 32px;
      box-shadow: 0 12px 60px rgba(120,10,30,0.22), 0 2px 12px rgba(120,10,30,0.10);
      padding: 52px 48px 44px;
      max-width: 480px; width: 90vw;
      text-align: center;
      animation: cardReveal 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardReveal {
      0%   { opacity: 0; transform: scale(0.6) translateY(40px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .card::before {
      content: '💍'; font-size: 2.6rem; display: block; margin-bottom: 10px;
      animation: ringBounce 2.4s ease-in-out infinite;
    }
    @keyframes ringBounce {
      0%,100% { transform: translateY(0) rotate(-6deg); }
      50%      { transform: translateY(-10px) rotate(6deg); }
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      color: var(--maroon); line-height: 1.25;
      margin-bottom: 8px; letter-spacing: -0.5px;
    }
    .subtitle {
      font-style: italic; color: #a04060;
      font-size: 0.95rem; margin-bottom: 36px; opacity: 0.85;
    }
    .btn-group {
      display: flex; align-items: center; justify-content: center;
      min-height: 72px; overflow: visible;
    }

    /* YES */
    .btn-yes {
      background: linear-gradient(135deg, #c0415a, var(--maroon));
      color: #fff; border: none; border-radius: 50px;
      padding: 16px 44px;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.2rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 6px 24px rgba(120,10,30,0.30);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.3s ease, font-size 0.4s ease, padding 0.4s ease;
      transform-origin: center left;
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .btn-yes::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      border-radius: inherit;
    }
    .btn-yes:hover  { transform: scale(1.06); box-shadow: 0 10px 36px rgba(120,10,30,0.40); }
    .btn-yes:active { transform: scale(0.97); }

    /* NO — fixed in viewport */
    .btn-no {
      background: transparent; color: #a04060;
      border: 2px solid #c0415a; border-radius: 50px;
      padding: 10px 24px;
      font-family: 'Lora', Georgia, serif; font-size: 0.88rem;
      cursor: pointer;
      position: fixed; bottom: 56px; right: 24px; z-index: 50;
      transition: background 0.2s, color 0.2s; white-space: nowrap;
    }
    .btn-no:hover { background: rgba(192,65,90,0.07); }

    /* ── Success ── */
    #success-screen {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(135deg, var(--maroon), #e87090, #fff8f9);
      align-items: center; justify-content: center;
      flex-direction: column; text-align: center; padding: 40px;
    }
    #success-screen.show { display: flex; }
    #success-screen h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.2rem, 6vw, 3.5rem); color: #fff;
      text-shadow: 0 2px 20px rgba(120,10,30,0.5); margin-bottom: 14px;
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }
    #success-screen p {
      color: rgba(255,255,255,0.9); font-size: 1.15rem; font-style: italic;
      animation: popIn 0.6s 0.15s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.5) translateY(30px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── Particles ── */
    .confetti {
      position: fixed; pointer-events: none; z-index: 200;
      animation: confettiFall 1.8s ease-in forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
    }
    .burst-heart {
      position: fixed; pointer-events: none; z-index: 150;
      animation: burstOut 1s ease-out forwards;
    }
    @keyframes burstOut {
      0%   { transform: translate(0,0) scale(0.5); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; }
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 36px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--maroon); color: #fff;
      padding: 13px 26px; border-radius: 50px; font-size: 0.93rem;
      box-shadow: 0 8px 30px rgba(120,10,30,0.35);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease;
      opacity: 0; z-index: 300; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 430px) {
      .card { padding: 40px 22px 34px; }
      body  { padding-bottom: 100px; }
      .box-scene { transform: scale(0.9); }
    }
  </style>
</head>
<body>

<div class="hearts-bg" id="hearts-bg"></div>

<!-- ══ SCREEN 1 : Ring Box ══ -->
<div id="box-screen">

  <div class="box-scene" id="box-scene" onclick="openBox()">

    <!-- LID — starts at rotateX(0) = closed flat over the body -->
    <div class="box-lid-wrap" id="box-lid-wrap">
      <div class="box-lid"></div>
      <div class="lid-hinge"></div>
      <div class="lid-clasp"></div>
    </div>

    <!-- BODY — always visible underneath -->
    <div class="box-body">
      <div class="ring-pillow">
        <span class="ring-emoji">💍</span>
      </div>
    </div>

  </div>

  <p class="tap-hint" id="tap-hint">✨ Tap to open ✨</p>

</div>

<!-- ══ SCREEN 2 : Proposal ══ -->
<div id="proposal-screen">
  <div class="card">
    <h1>Will you marry me&nbsp;👀?</h1>
    <p class="subtitle">Think carefully before you answer…</p>
    <div class="btn-group">
      <button class="btn-yes" id="btn-yes" onclick="onYes()">Yes! 💍</button>
    </div>
  </div>
  <button class="btn-no" id="btn-no" onclick="onNo()">No</button>
</div>

<div id="success-screen">
  <h2>Yay!!! I knew it ❤️</h2>
  <p>You've made me the happiest person in the world 🥹💍</p>
</div>

<div id="toast">Error: You can't say no ❤️</div>

<script>
/* ── Floating hearts ── */
const heartsBg    = document.getElementById('hearts-bg');
const heartEmojis = ['❤️','🩷','💕','💗','💖','💓','🫶'];
for (let i = 0; i < 18; i++) {
  const el = document.createElement('span');
  el.classList.add('heart-float');
  el.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
  const dur = 8 + Math.random() * 10;
  el.style.cssText = `
    left:${Math.random()*100}%;
    font-size:${0.8+Math.random()*0.9}rem;
    animation-duration:${dur}s;
    animation-delay:${-(Math.random()*dur)}s;
  `;
  heartsBg.appendChild(el);
}

/* ── Ring box open sequence ── */
let boxOpened = false;

function openBox() {
  if (boxOpened) return;
  boxOpened = true;

  const scene = document.getElementById('box-scene');
  const hint  = document.getElementById('tap-hint');

  // Step 1 — suspense shake
  const shakeFrames = [6,-6,5,-5,4,-4,2,-2,1,0];
  let si = 0;
  scene.style.transition = 'none';
  const shakeTimer = setInterval(() => {
    scene.style.transform = `translateX(${shakeFrames[si]}px)`;
    si++;
    if (si >= shakeFrames.length) {
      clearInterval(shakeTimer);
      scene.style.transform = '';

      // Step 2 — flip lid open (CSS transition kicks in)
      setTimeout(() => {
        scene.classList.add('opened');
        hint.style.opacity = '0';
        playCreak();

        // Step 3 — pause so user admires the ring, then transition
        setTimeout(revealProposal, 1400);
      }, 60);
    }
  }, 48);
}

function revealProposal() {
  const boxScreen      = document.getElementById('box-screen');
  const proposalScreen = document.getElementById('proposal-screen');

  boxScreen.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
  boxScreen.style.opacity    = '0';
  boxScreen.style.transform  = 'scale(0.88)';

  setTimeout(() => {
    boxScreen.style.display      = 'none';
    proposalScreen.style.display = 'flex';
    spawnBurstHearts(14, 0.65);
  }, 500);
}

/* ── NO button ── */
const btnYes = document.getElementById('btn-yes');
const btnNo  = document.getElementById('btn-no');
const toast  = document.getElementById('toast');

const noLabels = ['No','guguuuu 🥺','khandrooooo 😭','bithhiiiii 💔','jaaannnn 🙏','apki haan ki udeek hai 😔','paddd khalo baby fir 📚😤'];
let noClickCount = 0, yesScale = 1, toastTimeout;

function teleportNo() {
  const bw = btnNo.offsetWidth  || 110;
  const bh = btnNo.offsetHeight || 42;
  const m  = 16;
  const x  = m + Math.random() * Math.max(0, window.innerWidth  - bw - m*2);
  const y  = m + Math.random() * Math.max(0, window.innerHeight - bh - m*2);
  btnNo.style.left = x+'px'; btnNo.style.top = y+'px';
  btnNo.style.right = 'auto'; btnNo.style.bottom = 'auto';
  btnNo.style.transform = 'none';
  btnNo.style.transition = 'left 0.28s ease, top 0.28s ease';
}

btnNo.addEventListener('mouseenter', () => { if (noClickCount >= 2) teleportNo(); });

function onNo() {
  noClickCount++;
  showToast();
  btnNo.textContent = noLabels[Math.min(noClickCount, noLabels.length-1)];
  const maxScale = window.innerWidth < 430 ? 1.8 : 2.6;
  yesScale = Math.min(yesScale + 0.18, maxScale);
  btnYes.style.transform = `scale(${yesScale})`;
  btnYes.style.fontSize  = `${1.2 + Math.min(noClickCount*0.1, 0.6)}rem`;
  btnYes.style.padding   = `${16+Math.min(noClickCount*3,18)}px ${44+Math.min(noClickCount*6,36)}px`;
  btnYes.style.boxShadow = `0 ${6+noClickCount*3}px ${24+noClickCount*8}px rgba(120,10,30,0.40)`;
  teleportNo();
}

function showToast() {
  clearTimeout(toastTimeout);
  toast.classList.add('show');
  toastTimeout = setTimeout(() => toast.classList.remove('show'), 2600);
}

/* ── YES button ── */
function onYes() {
  spawnBurstHearts(20, 1);
  spawnConfetti(80);
  playChime();
  setTimeout(() => {
    document.getElementById('success-screen').classList.add('show');
    setTimeout(() => spawnConfetti(60), 400);
  }, 600);
}

/* ── Particles ── */
function spawnBurstHearts(count, scale) {
  const cx = window.innerWidth/2, cy = window.innerHeight/2;
  const em = ['❤️','💖','💕','💗','🩷','💓','💝'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('span');
    el.classList.add('burst-heart');
    el.textContent = em[Math.floor(Math.random()*em.length)];
    const angle = (Math.PI*2*i)/count + Math.random()*0.5;
    const dist  = (90+Math.random()*170)*scale;
    el.style.cssText = `left:${cx}px;top:${cy}px;
      --tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;
      animation-duration:${0.7+Math.random()*0.6}s;
      font-size:${(0.9+Math.random()*1.1)*scale}rem;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1400);
  }
}

const confettiColors = ['#c0415a','#f7c5d0','#d4af37','#fff','#7b0d1e','#ff85a1','#ffcad4'];
function spawnConfetti(count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.classList.add('confetti');
      el.style.cssText = `
        left:${Math.random()*100}vw; top:${-10-Math.random()*20}px;
        background:${confettiColors[Math.floor(Math.random()*confettiColors.length)]};
        width:${6+Math.random()*10}px; height:${6+Math.random()*10}px;
        border-radius:${Math.random()>0.5?'50%':'2px'};
        animation-duration:${1.2+Math.random()*1.2}s;
        animation-delay:${Math.random()*0.4}s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2800);
    }, i*14);
  }
}

/* ── Sounds ── */
function playCreak() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const buf = ctx.createBuffer(1, ctx.sampleRate*0.45, ctx.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length)*0.85;
    const src  = ctx.createBufferSource(); src.buffer = buf;
    const filt = ctx.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value=280; filt.Q.value=0.5;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
    src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
    src.start();
  } catch(e){}
}

function playChime() {
  try {
    const ctx   = new (window.AudioContext||window.webkitAudioContext)();
    [523.25,659.25,783.99,1046.5].forEach((freq,i) => {
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type='sine'; osc.frequency.value=freq;
      const t=ctx.currentTime+i*0.18;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.22,t+0.05);
      gain.gain.exponentialRampToValueAtTime(0.001,t+0.7);
      osc.start(t); osc.stop(t+0.75);
    });
  } catch(e){}
}
</script>
